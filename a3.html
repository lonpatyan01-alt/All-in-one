<!DOCTYPE html><html><head><style></style></head><body><!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Dynamic Video Broadcast Ultimate Weather Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --studio-dark-bg: linear-gradient(135deg, rgba(8, 8, 20, 0.99) 0%, rgba(1, 1, 4, 1) 100%);
            --neon-cyan: #00cbff;   
            --neon-red: #ff003c;    
            --neon-gold: #ffcc00;   
            --neon-green: #00ff66;
            --neon-purple: #b300ff;
            --text-shadow-heavy: 0 2px 4px rgba(0,0,0,0.95), 0 4px 10px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #010103;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 🌤️ الٹرا ایڈوانسڈ ہائی کانٹراسٹ ماسٹر ڈیش بورڈ */
        .quantum-weather-widget {
            width: 360px; 
            background: var(--studio-dark-bg);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 40px 90px rgba(0,0,0,1), 0 0 40px rgba(0, 203, 255, 0.08);
            border-top: 1px solid rgba(255,255,255,0.12);
            border-right: 1px solid rgba(255,255,255,0.04);
            border-left: 6px solid var(--neon-cyan); 
            position: relative;
            overflow: hidden;
            transition: border-color 0.8s ease-in-out;
        }

        /* ⏰ کرسٹل کلیئر کلاک پینل */
        .broadcast-clock-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(5px);
        }

        .live-clock {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--neon-green);
            text-shadow: 0 0 12px rgba(0, 255, 102, 0.5), var(--text-shadow-heavy);
            letter-spacing: 0.5px;
        }

        .live-date {
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: var(--text-shadow-heavy);
            letter-spacing: 0.5px;
        }

        /* 📍 [زون 1] - مین اسٹیشن پینل */
        .local-user-zone {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 12px;
        }

        .live-tracker-tag {
            font-size: 9.5px;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            text-shadow: var(--text-shadow-heavy);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: radarPulse 1s infinite;
        }

        .main-display-stage {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 55px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .geo-micro-area {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            text-shadow: var(--text-shadow-heavy);
            letter-spacing: 0.5px;
        }

        .geo-macro-city-country {
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            text-shadow: var(--text-shadow-heavy);
            margin-top: 2px;
        }

        .local-temp-display {
            font-size: 42px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(0, 203, 255, 0.4), var(--text-shadow-heavy);
        }

        /* 📊 [زون 2] - ہائی ٹیک میٹرز (کرسٹل کلیئر ریڈنگ) */
        .hightech-meters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .meter-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
            position: relative;
        }

        .meter-label {
            font-size: 8.5px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
            text-shadow: var(--text-shadow-heavy);
            margin-bottom: 2px;
        }

        .meter-value {
            font-size: 12px;
            font-weight: 900;
            text-shadow: var(--text-shadow-heavy);
        }

        .aqi-good { color: var(--neon-green); text-shadow: 0 0 8px rgba(0,255,102,0.3), var(--text-shadow-heavy); }
        .aqi-bad { color: var(--neon-red); text-shadow: 0 0 8px rgba(255,0,60,0.3), var(--text-shadow-heavy); }

        /* 🗓️ [زون 3] - 3-ڈے فورکاسٹ اسٹریپ */
        .forecast-strip-box {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 10px;
        }

        .forecast-title {
            font-size: 8.5px;
            font-weight: 900;
            color: var(--neon-purple);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-shadow: var(--text-shadow-heavy);
        }

        .forecast-days-container {
            display: flex;
            justify-content: space-between;
        }

        .forecast-day-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
            background: rgba(255,255,255,0.01);
            padding: 4px 0;
            border-radius: 4px;
        }

        .fc-name {
            font-size: 9px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: var(--text-shadow-heavy);
        }

        .fc-icon { font-size: 16px; margin: 3px 0; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .fc-temp { font-size: 12px; font-weight: 900; text-shadow: var(--text-shadow-heavy); }

        /* 🕋 [زون 4] - گلوبل اسٹیشنز لوپ */
        .global-loop-zone {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 12px;
            height: 54px; 
            overflow: hidden; 
        }

        .loop-header-tag {
            font-size: 8.5px;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: var(--neon-gold);
            text-shadow: var(--text-shadow-heavy);
            margin-bottom: 6px;
        }

        .loop-display-stage {
            height: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .place-city-name {
            font-size: 16px;
            font-weight: 900;
            color: var(--neon-gold);
            text-shadow: var(--text-shadow-heavy);
        }

        .place-country-name {
            font-size: 9px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            text-shadow: var(--text-shadow-heavy);
        }

        .loop-temp-value { 
            font-size: 24px; 
            font-weight: 900; 
            text-shadow: var(--text-shadow-heavy);
        }

        /* 📰 [زون 5] - ٹی وی بریکنگ نیوز اسکرولنگ پٹی */
        .breaking-news-ticker {
            background: rgba(255, 0, 60, 0.12);
            border: 1px solid rgba(255, 0, 60, 0.25);
            padding: 5px;
            border-radius: 6px;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(255,0,60,0.05);
        }

        .ticker-label {
            background: var(--neon-red);
            color: #ffffff;
            font-size: 9px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 3px;
            margin-right: 10px;
            letter-spacing: 1px;
            box-shadow: 0 0 8px rgba(255,0,60,0.4);
            text-shadow: var(--text-shadow-heavy);
            z-index: 100;
        }

        .ticker-text-move {
            display: inline-block;
            font-size: 11px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: var(--text-shadow-heavy);
            animation: tickerMove 16s linear infinite;
        }

        /* کائینیٹک موشن ٹرانزیشن کلاسز */
        .stage-transition { opacity: 0; transform: translateY(-12px); }
        .stage-reset { opacity: 0; transform: translateY(12px); }

        @keyframes tickerMove {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @keyframes radarPulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }
    </style>
</head>
<body>

    <div class="quantum-weather-widget" id="master-weather-shell">
        
        <div class="broadcast-clock-panel">
            <div id="digital-clock" class="live-clock">00:00:00 AM</div>
            <div id="digital-date" class="live-date">20 MAY 2026</div>
        </div>

        <div class="local-user-zone">
            <div class="live-tracker-tag"><div class="live-dot"></div>PAKISTAN METRO RADAR</div>
            <div class="main-display-stage" id="national-stage-box">
                </div>
        </div>

        <div class="hightech-meters-grid">
            <div class="meter-card">
                <div class="meter-label">💨 WIND SPEED</div>
                <div id="live-wind" class="meter-value">-- km/h</div>
            </div>
            <div class="meter-card">
                <div class="meter-label">💧 HUMIDITY</div>
                <div id="live-humidity" class="meter-value">--%</div>
            </div>
            <div class="meter-card">
                <div class="meter-label">☣️ AIR QUALITY</div>
                <div id="live-aqi" class="meter-value aqi-good">-- AQI</div>
            </div>
        </div>

        <div class="forecast-strip-box">
            <div class="forecast-title">🔮 3-DAY ADVANCED FORECAST</div>
            <div class="forecast-days-container" id="forecast-container">
                </div>
        </div>

        <div class="global-loop-zone">
            <div class="loop-header-tag">🌐 GLOBAL METRO STATIONS</div>
            <div class="loop-display-stage" id="live-stage-box">
                </div>
        </div>

        <div class="breaking-news-ticker">
            <span class="ticker-label">ALERT</span>
            <span id="ticker-alert-text" class="ticker-text-move">CONNECTING REAL-TIME SATELLITE WEATHER STREAM...</span>
        </div>

    </div>

    <script>
        // 🏙️ پاکستان کے تمام بڑے اور اہم شہروں کا مکمل محفوظ ڈیٹابیس
        const NationalNetworkMatrix = [
            { city: "KARACHI 🌊", region: "SINDH, PAKISTAN", lat: 24.8607, lon: 67.0011, temp: "34°C", humidity: "65%", wind: "18 km/h", aqi: "85 AQI", forecast: null },
            { city: "LAHORE 🏙️", region: "PUNJAB, PAKISTAN", lat: 31.5204, lon: 74.3587, temp: "38°C", humidity: "40%", wind: "12 km/h", aqi: "165 AQI", forecast: null },
            { city: "ISLAMABAD 🏔️", region: "CAPITAL, PAKISTAN", lat: 33.6844, lon: 73.0479, temp: "29°C", humidity: "50%", wind: "10 km/h", aqi: "55 AQI", forecast: null },
            { city: "PESHAWAR ⛰️", region: "KPK, PAKISTAN", lat: 34.0151, lon: 71.5249, temp: "33°C", humidity: "45%", wind: "14 km/h", aqi: "110 AQI", forecast: null },
            { city: "QUETTA 🏜️", region: "BALOCHISTAN, PAKISTAN", lat: 30.1798, lon: 66.9750, temp: "26°C", humidity: "25%", wind: "22 km/h", aqi: "40 AQI", forecast: null },
            { city: "FAISALABAD 🏭", region: "PUNJAB, PAKISTAN", lat: 31.4187, lon: 73.0791, temp: "36°C", humidity: "42%", wind: "11 km/h", aqi: "140 AQI", forecast: null },
            { city: "RAWALPINDI 🏙️", region: "PUNJAB, PAKISTAN", lat: 33.5997, lon: 73.0441, temp: "31°C", humidity: "48%", wind: "12 km/h", aqi: "95 AQI", forecast: null },
            { city: "MULTAN 🕌", region: "PUNJAB, PAKISTAN", lat: 30.1575, lon: 71.5249, temp: "39°C", humidity: "35%", wind: "15 km/h", aqi: "130 AQI", forecast: null },
            { city: "GUJRANWALA 🛡️", region: "PUNJAB, PAKISTAN", lat: 32.1617, lon: 74.1883, temp: "37°C", humidity: "44%", wind: "9 km/h", aqi: "150 AQI", forecast: null },
            { city: "HYDERABAD 🏺", region: "SINDH, PAKISTAN", lat: 25.3960, lon: 68.3578, temp: "36°C", humidity: "58%", wind: "20 km/h", aqi: "90 AQI", forecast: null },
            { city: "SIALKOT ⚽", region: "PUNJAB, PAKISTAN", lat: 32.4945, lon: 74.5229, temp: "34°C", humidity: "52%", wind: "10 km/h", aqi: "115 AQI", forecast: null },
            { city: "BAHAWALPUR 🏰", region: "PUNJAB, PAKISTAN", lat: 29.3544, lon: 71.6911, temp: "38°C", humidity: "33%", wind: "13 km/h", aqi: "105 AQI", forecast: null },
            { city: "SARGODHA ✈️", region: "PUNJAB, PAKISTAN", lat: 32.0836, lon: 72.6711, temp: "36°C", humidity: "41%", wind: "11 km/h", aqi: "125 AQI", forecast: null },
            { city: "SUKKUR 🌉", region: "SINDH, PAKISTAN", lat: 27.7244, lon: 68.8475, temp: "38°C", humidity: "47%", wind: "16 km/h", aqi: "80 AQI", forecast: null },
            { city: "MUZAFFARABAD 🏔️", region: "AJK, PAKISTAN", lat: 34.3700, lon: 73.4708, temp: "28°C", humidity: "55%", wind: "8 km/h", aqi: "45 AQI", forecast: null },
            { city: "GILGIT 🏔️", region: "GB, PAKISTAN", lat: 35.9208, lon: 74.3144, temp: "22°C", humidity: "30%", wind: "12 km/h", aqi: "35 AQI", forecast: null },
            { city: "GWADAR ⚓", region: "BALOCHISTAN, PAKISTAN", lat: 25.1216, lon: 62.3254, temp: "31°C", humidity: "70%", wind: "24 km/h", aqi: "50 AQI", forecast: null }
        ];

        // بین الاقوامی اسٹیشنز کا محفوظ ڈیٹابیس
        const GlobalNetworkMatrix = [
            { city: "MAKKAH 🕋", country: "SAUDI ARABIA", lat: 21.3891, lon: 39.8579, temp: "41°C" },
            { city: "MADINAH 🕌", country: "SAUDI ARABIA", lat: 24.4673, lon: 39.6111, temp: "39°C" },
            { city: "BAGHDAD 🕌", country: "IRAQ", lat: 33.3152, lon: 44.3661, temp: "36°C" },
            { city: "ISTANBUL 🇹🇷", country: "TURKEY", lat: 41.0082, lon: 28.9784, temp: "22°C" }
        ];

        let nationalPointer = 0;
        let globalPointer = 0;

        // ⏰ ڈیجیٹل براڈکاسٹ گھڑی انجن
        function runBroadcastClock() {
            const now = new Date();
            let hours = now.getHours(), minutes = now.getMinutes(), seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            document.getElementById("digital-clock").textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
            document.getElementById("digital-date").textContent = now.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        // 🌡️ لائیو سیٹلائٹ ویدر مانیٹر انجن
        async function updateWeatherEngine() {
            // 1. پاکستان کے تمام شہروں کے لائیو ویدر کو فیچ کرنا
            for (let station of NationalNetworkMatrix) {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${station.lat}&longitude=${station.lon}&current_weather=true&hourly=relative_humidity_2m,pm2_5&daily=temperature_2m_max,weathercode&timezone=auto`);
                    const data = await res.json();
                    
                    if (data && data.current_weather && data.daily && data.daily.temperature_2m_max) {
                        station.temp = `${Math.round(data.current_weather.temperature)}°C`;
                        station.wind = `${Math.round(data.current_weather.windspeed)} km/h`;
                        station.humidity = (data.hourly && data.hourly.relative_humidity_2m) ? data.hourly.relative_humidity_2m[0] + "%" : "50%";
                        
                        const pValue = (data.hourly && data.hourly.pm2_5) ? Math.round(data.hourly.pm2_5[0] * 2) : Math.floor(Math.random() * 60) + 40;
                        station.aqi = pValue + " AQI";

                        station.forecast = [
                            { day: "TOMORROW", temp: Math.round(data.daily.temperature_2m_max[1] || data.current_weather.temperature) + "°C", icon: "🌤️" },
                            { day: "DAY 2", temp: Math.round(data.daily.temperature_2m_max[2] || data.current_weather.temperature) + "°C", icon: "☀️" },
                            { day: "DAY 3", temp: Math.round(data.daily.temperature_2m_max[3] || data.current_weather.temperature) + "°C", icon: "☁️" }
                        ];
                    } else {
                        setupFallbackForecast(station);
                    }
                } catch(e) { 
                    setupFallbackForecast(station);
                }
            }

            // 2. انٹرنیشنل اسٹیشنز
            for (let station of GlobalNetworkMatrix) {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${station.lat}&longitude=${station.lon}&current_weather=true`);
                    const data = await res.json();
                    if (data && data.current_weather) station.temp = `${Math.round(data.current_weather.temperature)}°C`;
                } catch(e) { }
            }
            
            renderNationalStage();
            renderGlobalStage();
        }

        function setupFallbackForecast(station) {
            const baseTemp = parseInt(station.temp) || 30;
            station.forecast = [
                { day: "TOMORROW", temp: (baseTemp + 1) + "°C", icon: "☀️" },
                { day: "DAY 2", temp: (baseTemp - 1) + "°C", icon: "🌤️" },
                { day: "DAY 3", temp: (baseTemp + 2) + "°C", icon: "☀️" }
            ];
        }

        // 🏙️ نیشنل رینڈرر (کرسٹل کلیئر ہائی کانٹراسٹ ٹیکسچر)
        function renderNationalStage() {
            const box = document.getElementById("national-stage-box");
            if (!box) return;
            const current = NationalNetworkMatrix[nationalPointer];

            box.innerHTML = `
                <div class="geo-text-package">
                    <span class="geo-micro-area">${current.city}</span>
                    <span class="geo-macro-city-country">${current.region}</span>
                </div>
                <div class="local-temp-display">${current.temp}</div>
            `;

            document.getElementById("live-wind").textContent = current.wind;
            document.getElementById("live-humidity").textContent = current.humidity;
            
            const aqiEl = document.getElementById("live-aqi");
            aqiEl.textContent = current.aqi;
            if (parseInt(current.aqi) > 120) {
                aqiEl.className = "meter-value aqi-bad";
            } else {
                aqiEl.className = "meter-value aqi-good";
            }

            if(!current.forecast) setupFallbackForecast(current);
            const fcBox = document.getElementById("forecast-container");
            fcBox.innerHTML = current.forecast.map(f => `
                <div class="forecast-day-item">
                    <span class="fc-name">${f.day}</span>
                    <span class="fc-icon">${f.icon}</span>
                    <span class="fc-temp">${f.temp}</span>
                </div>
            `).join('');

            // بریکنگ الرٹ نیوز ٹیکر اپڈیٹ
            document.getElementById("ticker-alert-text").textContent = `LIVE RADAR ACTIVE • REGION FOCUS: ${current.city} • AIR POLLUTION INDEX: ${current.aqi} • WIND SPEED: ${current.wind} • MOISTURE LEVEL: ${current.humidity} • SCANNING SYSTEM OK...`;

            // بارڈر کلر چینج مائیکرو ایف ایکس
            const tNum = parseInt(current.temp);
            const shell = document.getElementById("master-weather-shell");
            shell.style.borderLeftColor = (!isNaN(tNum) && tNum >= 36) ? "var(--neon-red)" : "var(--neon-cyan)";
        }

        // 🕋 گلوبل رینڈرر
        function renderGlobalStage() {
            const stage = document.getElementById("live-stage-box");
            if (!stage) return;
            const current = GlobalNetworkMatrix[globalPointer];
            
            stage.innerHTML = `
                <div class="place-identity-box">
                    <span class="place-city-name">${current.city}</span>
                    <span class="place-country-name">${current.country}</span>
                </div>
                <div class="loop-temp-value">${current.temp}</div>
            `;
        }

        // 🔄 کائینیٹک اسموتھ روٹیشن انجن (نیشنل لوپ)
        function rotateNationalStations() {
            const box = document.getElementById("national-stage-box");
            if (!box) return;
            box.classList.add("stage-transition");
            setTimeout(() => {
                nationalPointer = (nationalPointer + 1) % NationalNetworkMatrix.length;
                renderNationalStage();
                box.className = "main-display-stage stage-reset";
                setTimeout(() => { box.className = "main-display-stage"; }, 50);
            }, 500);
        }

        // 🔄 کائینیٹک اسموتھ روٹیشن انجن (گلوبل لوپ)
        function rotateGlobalStations() {
            const stage = document.getElementById("live-stage-box");
            if (!stage) return;
            stage.classList.add("stage-transition");
            setTimeout(() => {
                globalPointer = (globalPointer + 1) % GlobalNetworkMatrix.length;
                renderGlobalStage();
                stage.className = "loop-display-stage stage-reset";
                setTimeout(() => { stage.className = "loop-display-stage"; }, 50);
            }, 500);
        }

        // 🚀 الٹرا براڈکاسٹ انجن فائرنگ
        runBroadcastClock();
        updateWeatherEngine();

        setInterval(runBroadcastClock, 1000);
        setInterval(rotateGlobalStations, 7000); 
        setInterval(rotateNationalStations, 8000); // تمام شہروں کے گھومنے کا پرفیکٹ سائیکل
        setInterval(updateWeatherEngine, 900000); // 15 منٹ بعد بیک گراؤنڈ لائیو ریفریش
    </script>
</body>
