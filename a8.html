<!DOCTYPE html><html><head><style></style></head><body><!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum High-Precision Global Stocks & Corporate Monitor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --studio-dark-bg: linear-gradient(135deg, rgba(12, 10, 18, 0.99) 0%, rgba(3, 2, 6, 1) 100%);
            --text-glow: 0 2px 10px rgba(0, 0, 0, 0.9);
            
            /* 🇺🇸 ڈائنامک گلوبل انڈیکس نیون کلرز */
            --global-bullish: #00ff66;    /* عالمی تیزی (Neon Green) */
            --global-bearish: #ff3344;    /* عالمی مندی (Neon Red) */
            --global-purple: #9933ff;     /* وال اسٹریٹ تھیم (Wall Street Purple) */
            --global-cyan: #00e5ff;       /* مارکیٹ والیم / ٹیک زون (Cyan) */
            --global-amber: #ffaa00;      /* رسک انڈیکس / انتباہ (Amber) */
        }

        body {
            background-color: #010103;
            padding: 0;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 📺 گرینڈ عالمی اسٹاکس لائیو ویڈیو براڈکاسٹ وال فریم */
        .broadcast-video-wall {
            width: 350px;
            background: var(--studio-dark-bg);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.95), inset 0 0 40px rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
            border-left: 6px solid var(--global-purple);
            transition: border-color 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 🌊 کائینیٹک نیون موشن لائیو پس منظر لہر */
        .broadcast-video-wall::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(153, 51, 255, 0.02) 0%, transparent 65%);
            animation: pulseWave 12s infinite linear;
            pointer-events: none;
            z-index: 1;
        }

        /* 🛰️ ٹاپ ماسٹر ٹیلی میٹری ہیڈر پینل */
        .studio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 8px;
            z-index: 2;
        }

        .live-tag {
            color: var(--global-bearish);
            display: flex;
            align-items: center;
            gap: 5px;
            animation: flashOverlay 1s infinite;
        }

        /* 🏙️ مارکیٹ ریڈار مین ہیڈنگز */
        .market-identity-panel {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 2;
        }

        .market-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .widget-mode-indicator {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: var(--global-cyan);
            text-transform: uppercase;
            margin-top: 2px;
            background: rgba(0, 229, 255, 0.08);
            padding: 2px 8px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        /* 📊 گرینڈ ڈیک گرڈ فار انڈیکسز */
        .display-deck {
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 2;
            min-height: 195px;
        }

        /* 📦 انڈیکس پینل وزٹس */
        .index-box {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-right: 4px solid var(--global-purple);
            animation: fadeInSlot 0.5s ease-in-out;
        }

        .index-title-row {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .index-main-metrics {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .huge-number {
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
            text-shadow: var(--text-glow);
        }

        .change-text {
            font-size: 13px;
            font-weight: 900;
        }

        .volume-text-box {
            font-size: 10px;
            font-weight: 800;
            color: var(--global-cyan);
            text-align: right;
        }

        /* 📝 اسمارٹ لائیو اردو ایڈوائزری کمنٹری باکس */
        .broadcast-advisory-center {
            background: rgba(255, 255, 255, 0.01);
            border-left: 4px solid var(--global-purple);
            border-radius: 8px;
            padding: 12px;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.6;
            direction: rtl;
            min-height: 38px;
            z-index: 2;
            transition: border-color 0.5s ease;
        }

        /* 📢 نچلی لوئر-تھرڈ کائینیٹک پٹی (عالمی انڈیکس میٹرکس) */
        .studio-news-ticker {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 2;
        }

        .ticker-header {
            font-size: 9px;
            font-weight: 900;
            color: #ffcc00;
            letter-spacing: 1.5px;
        }

        /* 🔁 اسٹیج اینیمیشن باکس */
        .ticker-stage {
            height: 32px;
            position: relative;
            overflow: hidden;
        }

        .ticker-inner-box {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .stage-fade-out {
            opacity: 0;
            transform: translateY(-15px);
        }

        .stage-fade-in {
            opacity: 0;
            transform: translateY(15px);
        }

        .market-index-name {
            font-size: 12px;
            font-weight: 900;
        }

        .market-index-value {
            font-size: 13px;
            font-weight: 900;
        }

        /* 🎬 اسٹوڈیو اینیمیشن رولز */
        @keyframes pulseWave {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.08); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes flashOverlay {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes fadeInSlot {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="broadcast-video-wall" id="main-studio-frame">
        
        <div class="studio-header">
            <div class="live-tag">🔴 QUANTUM MARKET INTELLIGENCE</div>
            <div id="studio-live-clock">00:00:00 AM</div>
        </div>

        <div class="market-identity-panel">
            <div style="display: flex; flex-direction: column;">
                <span class="market-title">GLOBAL RADAR</span>
                <span id="widget-mode-text" class="widget-mode-indicator">MODE: WALL STREET CORE</span>
            </div>
        </div>

        <div class="display-deck" id="dynamic-display-deck">
            </div>

        <div class="broadcast-advisory-center" id="live-advisory-output">
            عالمی نیٹ ورک سسٹمز لوڈ ہو رہے ہیں...
        </div>

        <div class="studio-news-ticker">
            <div class="ticker-header">🌍 LIVE INTERNATIONAL MARKETS TICKER</div>
            <div class="ticker-stage">
                <div class="ticker-inner-box" id="global-stage-box">
                    </div>
            </div>
        </div>

    </div>

    <script>
        // 🌍 بین الاقوامی انڈیکسز کا لوئر تھرڈ ڈیٹا بیس
        const GlobalMarketsMatrix = [
            { name: "NASDAQ Composite 💻", value: "16,342.50", trend: "+1.15%", color: "var(--global-bullish)" },
            { name: "FTSE 100 London 🇬🇧", value: "7,951.20", trend: "-0.28%", color: "var(--global-bearish)" },
            { name: "Nikkei 225 Tokyo 🇯🇵", value: "38,824.90", trend: "+0.88%", color: "var(--global-bullish)" },
            { name: "DAX Performance Germany 🇩🇪", value: "18,162.30", trend: "+0.45%", color: "var(--global-bullish)" }
        ];

        // 🚀 لائیو بدلتے ہوئے موڈز کا ڈیٹا جنریٹر ڈیٹا بیس
        let currentMode = 0; // 0 = Wall Street Core, 1 = Tech Titans, 2 = Risk Metrics
        let globalPointer = 0;
        
        // وال اسٹریٹ رننگ لائیو ویلیوز
        let dowPoints = 39125; let spPoints = 5212;
        let appleStock = 172.50; let nvidiaStock = 875.40; let teslaStock = 175.20;
        let vixIndex = 13.42;

        // ⏱️ ڈیجیٹل کلاک
        function startStudioClock() {
            setInterval(() => {
                document.getElementById("studio-live-clock").textContent = new Date().toLocaleTimeString('en-US', { hour12: true });
            }, 1000);
        }

        // 📡 ہائی فریکوئنسی ڈیٹا فلکچویشن انجن (صرف گلوبل فنانس موضوع)
        function updateLiveNumbers() {
            dowPoints += Math.round(Math.random() * 40 - 18);
            spPoints += Math.round(Math.random() * 6 - 2.5);
            appleStock += (Math.random() * 0.6 - 0.28);
            nvidiaStock += (Math.random() * 4.5 - 2.0);
            teslaStock += (Math.random() * 1.2 - 0.65);
            vixIndex += (Math.random() * 0.2 - 0.09);

            renderActiveMode();
        }

        // 🎛️ ڈائنامک اسکرین چینجر مینیجر (یہ خصوصیات کو مستقل تبدیل کرتا ہے)
        function switchScreenMode() {
            currentMode = (currentMode + 1) % 3;
            const modeIndicator = document.getElementById("widget-mode-text");
            
            if (currentMode === 0) {
                modeIndicator.textContent = "MODE: WALL STREET CORE";
                modeIndicator.style.color = "var(--global-cyan)";
                modeIndicator.style.background = "rgba(0, 229, 255, 0.08)";
            } else if (currentMode === 1) {
                modeIndicator.textContent = "MODE: TECH TITANS SHARES";
                modeIndicator.style.color = "var(--global-purple)";
                modeIndicator.style.background = "rgba(153, 51, 255, 0.08)";
            } else {
                modeIndicator.textContent = "MODE: RISK & VOLATILITY";
                modeIndicator.style.color = "var(--global-amber)";
                modeIndicator.style.background = "rgba(255, 170, 0, 0.08)";
            }
            renderActiveMode();
        }

        // 🎨 ایکٹو موڈ رینڈرنگ ڈیک
        function renderActiveMode() {
            const deck = document.getElementById("dynamic-display-deck");
            const advisory = document.getElementById("live-advisory-output");
            const frame = document.getElementById("main-studio-frame");
            if (!deck) return;

            let htmlContent = "";
            let adviceUrdu = "";

            // موڈ ۱: وال اسٹریٹ کور انڈیکسز
            if (currentMode === 0) {
                frame.style.borderLeftColor = "var(--global-purple)";
                advisory.style.borderLeftColor = "var(--global-purple)";
                adviceUrdu = `وال اسٹریٹ کور انڈیکس مستحکم زون میں ٹریڈ کر رہے ہیں۔ ڈاؤ جونز اور S&P 500 انڈسٹریل سیکٹرز میں والیم نارمل ہینڈل ہو رہا ہے۔ ⚖️`;

                htmlContent = `
                    <div class="index-box" style="border-right-color: var(--global-purple)">
                        <div class="index-title-row"><span>🇺🇸 DOW JONES</span><span class="volume-text-box">VOL: 284M</span></div>
                        <div class="index-main-metrics">
                            <span class="huge-number" style="color: var(--global-purple)">${dowPoints.toLocaleString()}</span>
                            <span class="change-text" style="color: var(--global-bullish)">+0.42%</span>
                        </div>
                    </div>
                    <div class="index-box" style="border-right-color: var(--global-purple)">
                        <div class="index-title-row"><span>🇺🇸 S&P 500 INDEX</span><span class="volume-text-box">VOL: 112M</span></div>
                        <div class="index-main-metrics">
                            <span class="huge-number" style="color: var(--global-purple)">${spPoints.toLocaleString()}</span>
                            <span class="change-text" style="color: var(--global-bullish)">+0.35%</span>
                        </div>
                    </div>
                `;
            } 
            // موڈ ۲: کارپوریٹ ہائی ٹیک جائنٹس لائیو شیئرز
            else if (currentMode === 1) {
                frame.style.borderLeftColor = "var(--global-cyan)";
                advisory.style.borderLeftColor = "var(--global-cyan)";
                adviceUrdu = `ٹیکنالوجی مارکیٹ میں این ویڈیا (Nvidia) اور ایپل کے شیئرز میں وال اسٹریٹ پر غیر معمولی لائیو مومینٹم دیکھا جا رہا ہے۔ 💻`;

                htmlContent = `
                    <div class="index-box" style="border-right-color: var(--global-cyan); padding: 8px 12px;">
                        <div class="index-title-row"><span>🍏 APPLE INC (AAPL)</span><span>NASDAQ</span></div>
                        <div class="index-main-metrics">
                            <span class="huge-number" style="font-size:22px; color: #fff;">$${appleStock.toFixed(2)}</span>
                            <span class="change-text" style="color: var(--global-bearish)">-0.18%</span>
                        </div>
                    </div>
                    <div class="index-box" style="border-right-color: var(--global-cyan); padding: 8px 12px;">
                        <div class="index-title-row"><span>🟢 NVIDIA CORP (NVDA)</span><span>AI LEADER</span></div>
                        <div class="index-main-metrics">
                            <span class="huge-number" style="font-size:22px; color: var(--global-bullish)">$${nvidiaStock.toFixed(2)}</span>
                            <span class="change-text" style="color: var(--global-bullish)">+1.85%</span>
                        </div>
                    </div>
                    <div class="index-box" style="border-right-color: var(--global-cyan); padding: 8px 12px;">
                        <div class="index-title-row"><span>⚡ TESLA INC (TSLA)</span><span>EV METRICS</span></div>
                        <div class="index-main-metrics">
                            <span class="huge-number" style="font-size:22px; color: #fff;">$${teslaStock.toFixed(2)}</span>
                            <span class="change-text" style="color: var(--global-bullish)">+0.62%</span>
                        </div>
                    </div>
                `;
            } 
            // موڈ ۳: مارکیٹ رسک اور اتار چڑھاؤ انڈیکس (VIX)
            else {
                frame.style.borderLeftColor = "var(--global-amber)";
                advisory.style.borderLeftColor = "var(--global-amber)";
                adviceUrdu = `عالمی مارکیٹ کا خوف ناپنے والا انڈیکس (VIX Risk) اس وقت مستحکم ہے، جو ظاہر کرتا ہے کہ مارکیٹ میں اچانک کریش یا بڑے خطرے کے امکانات کم ہیں۔ 🛡️`;

                htmlContent = `
                    <div class="index-box" style="border-right-color: var(--global-amber)">
                        <div class="index-title-row"><span>⚠️ CBOE VOLATILITY INDEX</span><span>MARKET FEAR (VIX)</span></div>
                        <div class="index-main-metrics">
                            <span class="huge-number" style="color: var(--global-amber)">${vixIndex.toFixed(2)}</span>
                            <span class="change-text" style="color: var(--global-cyan)">STABLE ZONE</span>
                        </div>
                    </div>
                    <div class="index-box" style="border-right-color: var(--global-amber)">
                        <div class="index-title-row"><span>📊 NASDAQ VOLUME DATA</span><span>HI-SPEED FEED</span></div>
                        <div class="index-main-metrics">
                            <span class="huge-number" style="font-size: 24px; color: #fff;">4.2 Billion</span>
                            <span class="change-text" style="color: var(--global-bullish)">ACTIVE</span>
                        </div>
                    </div>
                `;
            }

            deck.innerHTML = htmlContent;
            advisory.textContent = adviceUrdu;
        }

        // 🔁 بین الاقوامی انڈیکس روٹیشن اسٹیج مینیجر (لوئر تھرڈ)
        function renderGlobalStage() {
            const stage = document.getElementById("global-stage-box");
            if (!stage) return;

            const cur = GlobalMarketsMatrix[globalPointer];
            stage.innerHTML = `
                <div><span class="market-index-name">${cur.name}</span></div>
                <div class="market-index-value" style="color: ${cur.color}">${cur.value} <span style="font-size:11px">${cur.trend}</span></div>
            `;
        }

        // ⏱️ اسموتھ سلائیڈر انجن
        function rotateGlobalTicker() {
            const stage = document.getElementById("global-stage-box");
            if (!stage) return;

            stage.classList.add("stage-fade-out");

            setTimeout(() => {
                globalPointer = (globalPointer + 1) % GlobalMarketsMatrix.length;
                renderGlobalStage();

                stage.classList.remove("stage-fade-out");
                stage.classList.add("stage-fade-in");

                setTimeout(() => { stage.classList.remove("stage-fade-in"); }, 50);
            }, 600);
        }

        // 🚀 ماسٹر پاور آن فائرنگ پروٹوکولز
        startStudioClock();
        renderActiveMode();
        renderGlobalStage();

        // ⏳ آٹومیٹڈ لائیو ٹائمرز
        setInterval(updateLiveNumbers, 4000);     // ہر 4 سیکنڈ بعد لائیو قیمتیں اور پوائنٹس فلکچوئیٹ ہوں گے
        setInterval(switchScreenMode, 8000);      // ہر 8 سیکنڈ بعد پوری اسکرین کی خصوصیات اور میٹرکس خودکار طور پر بدل جائیں گے
        setInterval(rotateGlobalTicker, 5000);    // ہر 5 سیکنڈ بعد نچلا انٹرنیشنل ٹکر بدلے گا
    </script>
</body>
</html><script></script><script type="module"></script></body></html>
