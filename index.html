<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Broadcast Engine: Master Controller</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================================
           🎨 سائنسی کور ڈیزائن، ریسپانسیو گرڈ اور تھری ڈی کیمرہ ویو
           ============================================================ */
        :root {
            --bg-deep: linear-gradient(135deg, rgba(5, 5, 12, 1) 0%, rgba(1, 1, 4, 1) 100%);
            --neon-aqua: #00ffff;
            --neon-purple: #9d00ff;
            --main-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            background: var(--bg-deep);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🖼️ ریسپانسیو کنٹینر، جو موبائل اسکرین کے مطابق ایڈجسٹ ہوتا ہے */
        #master-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 🎬 3D اینیمیشن کا کنٹینر */
        #broadcast-stage {
            width: 100%;
            height: 100%;
            perspective: 1500px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            transform-style: preserve-3d;
        }

        /* 📱 ریسپانسیو فریم */
        .frame-host {
            width: 100%;
            height: 100%;
            position: absolute;
            opacity: 0;
            visibility: hidden;
            box-shadow: var(--main-shadow);
            border-radius: 20px;
            overflow: hidden;
            transform: translateZ(-200px) rotateY(0deg);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            background: #000;
            will-change: transform, opacity, visibility;
            padding: 10px;
        }

        /* 🔄 3D روٹیشن اینیمیشنز کے لیے کلاسز */
        .frame-host.enter-left {
            transform: translateZ(-300px) translateX(-100%) rotateY(20deg);
            opacity: 0;
            visibility: hidden;
        }

        .frame-host.active {
            opacity: 1;
            visibility: visible;
            transform: translateZ(0) rotateY(0deg);
            z-index: 10;
        }

        .frame-host.exit-right {
            transform: translateZ(-300px) translateX(100%) rotateY(-20deg);
            opacity: 0;
            visibility: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            overflow: hidden;
            display: block;
        }

        /* 🔔 الرٹ ٹکر */
        #breaking-alert {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px 18px;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            font-weight: 800;
            display: none;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
        }

    </style>
</head>
<body>

    <div id="master-container">
        <div id="broadcast-stage">



            
            <div class="frame-host" id="host-0">
                <iframe src="a1.html"></iframe>
            </div>
            
            <div class="frame-host" id="host-1">
                <iframe src="a2.html"></iframe>
            </div>
            
            <div class="frame-host" id="host-2">
                <iframe src="a3.html"></iframe>
            </div>

            <div class="frame-host" id="host-0">
                <iframe src="a4.html"></iframe>
            </div>
            
            <div class="frame-host" id="host-1">
                <iframe src="a5.html"></iframe>
            </div>
            
            <div class="frame-host" id="host-2">
                <iframe src="a6.html"></iframe>
            </div>

            
            <div class="frame-host" id="host-0">
                <iframe src="a7.html"></iframe>
            </div>
            
            <div class="frame-host" id="host-1">
                <iframe src="a8.html"></iframe>
            </div>
            
            <div class="frame-host" id="host-2">
                <iframe src="a9.html"></iframe>
            </div>

            <div class="frame-host" id="host-0">
                <iframe src="a10.html"></iframe>
            </div>
            
            <div class="frame-host" id="host-1">
                <iframe src="a11.html"></iframe>
            </div>
            
        </div>

        <div id="breaking-alert">
            <span style="color: red; margin-right: 5px;">! EMERGENCY</span>: GLOBAL ATMOSPHERIC EVENT IN PROGRESS...
        </div>
    </div>




        <audio id="hiddenStudioEngine" loop style="display: none; visibility: hidden; width: 0; height: 0;">
    <source id="masterAudioSource" src="**اپنی_آڈیو_کا_بیس64_کوڈ_یہاں_پیسٹ_کریں**" type="audio/mp3">
</audio>

    <script>
        // ============================================================
        // 🚀 ماسٹر براڈکاسٹ روٹیشن انجن اور اینیمیشنز
        // ============================================================
        const frames = [
            document.getElementById('host-0'),
            document.getElementById('host-1'),
            document.getElementById('host-2')
        ];
        
        let currentIndex = 0;
        const ROTATION_TIME = 30000; // 30 سیکنڈ

        // 🔄 تھری ڈی روٹیشن فنکشن
        function rotateFrames() {
            const currentFrame = frames[currentIndex];
            currentIndex = (currentIndex + 1) % frames.length;
            const nextFrame = frames[currentIndex];

            currentFrame.className = 'frame-host exit-right';
            nextFrame.className = 'frame-host active';
            
            setTimeout(() => {
                currentFrame.className = 'frame-host enter-left';
            }, 1000); // 1 سیکنڈ اینیمیشن
        }

        // 🚀 براڈکاسٹ انجن فائرنگ
        rotateFrames();
        setInterval(rotateFrames, ROTATION_TIME);




    /* =================================================================
       ⚙️ ماسٹر کنٹرولر سیٹنگز ہب (تمام تبدیلیاں یہاں سے کریں)
       ساجد بھائی، آپ کو نیچے کوڈ میں جانے کی ضرورت نہیں، صرف یہاں سے سیٹنگز بدلیں:
       ================================================================= */
    const MediaPointSettings = {
        // والیم سیٹنگز (0.0 سے لے کر 1.0 کے درمیان رکھیں)
        startingVolume: 0.28,      // شروع کا پاور فل والیم (جب صرف نیوز ٹریک چلے گا)
        vocalDuckingVolume: 0.07,  // چینل اور آپ کا نام آنے پر میوزک کتنا دھیما ہو (7% والیم)
        continuousVolume: 0.22,    // انٹرویو ختم ہونے کے بعد مستقل بیک گراؤنڈ میوزک کا والیم

        // ٹائمنگ اور ترتیب کی سیٹنگز (ملی سیکنڈز میں: 1000 یعنی 1 سیکنڈ)
        pureMusicDuration: 3500,   // [اسٹیپ 1]: شروع میں کتنی دیر صرف میوزک چلے (3.5 سیکنڈ)
        vocalIntroDuration: 10500, // [اسٹیپ 2]: چینل اور ہوسٹ کا انٹرویو کتنی دیر چلے گا (10.5 سیکنڈ)
        
        // ٹیسٹنگ موڈ
        testTrackUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
    };

    /* =================================================================
       🚀 مین کور آڈیو انجن (Core Engine - DO NOT TOUCH)
       ================================================================= */
    let isEngineActivated = false;

    function launchMasterAudioEngine() {
        if (isEngineActivated) return;

        const audioPlayer = document.getElementById('hiddenStudioEngine');
        const audioSource = document.getElementById('masterAudioSource');

        // سیفٹی اور ٹیسٹنگ چیک: اگر بیس64 کوڈ موجود نہ ہو تو عارضی طور پر آن لائن ٹریک چلائے گا تاکہ کوڈ فیل نہ ہو
        if (audioSource.src.includes("**" || audioSource.src === "")) {
            audioPlayer.src = MediaPointSettings.testTrackUrl;
        }

        // ترتیب کا آغاز: شروع کا پریمیم والیم لاک کریں
        audioPlayer.volume = MediaPointSettings.startingVolume;

        // پلے بیک فائر کریں
        audioPlayer.play().then(() => {
            isEngineActivated = true;
            console.log("میڈیا انجن: اسمارٹ میڈیا پوائنٹ کی نشریات پسِ منظر میں کامیابی سے جاری ہیں!");

            /* =========================================================
               ⏱️ خودکار ترتیب اور ٹائم لائن کنٹرولر
               ========================================================= */
            
            // مرحلہ 2: طے شدہ وقت (3.5 سیکنڈ) کے بعد میوزک کو خودکار دھیما کرنا تاکہ چینل اور آپ کا نام صاف سنائی دے
            setTimeout(() => {
                if (isEngineActivated) {
                    // والیم کو بغیر کسی جھٹکے کے سمتھ طریقے سے دھیما کریں
                    audioPlayer.volume = MediaPointSettings.vocalDuckingVolume;
                    console.log("میڈیا انجن: اسمارٹ میڈیا پوائنٹ برانڈ نیم اور اونر نیم فلو جاری ہے۔");
                }
            }, MediaPointSettings.pureMusicDuration);

            // مرحلہ 3: انٹرویو مکمل ہونے پر (14 سیکنڈ بعد) میوزک کو مستقل پریمیم لوپ والیم پر لاک کرنا
            const totalIntroTime = MediaPointSettings.pureMusicDuration + MediaPointSettings.vocalIntroDuration;
            setTimeout(() => {
                if (isEngineActivated) {
                    audioPlayer.volume = MediaPointSettings.continuousVolume;
                    console.log("میڈیا انجن: ٹریک اب چوبیس گھنٹے کے لیے مستقل بیک گراؤنڈ موڈ پر سیٹ ہو گیا ہے۔");
                }
            }, totalIntroTime);

        }).catch(err => {
            console.error("میڈیا انجن الرٹ: براؤزر نے آڈیو بلاک کی، دوبارہ کوشش کی جا رہی ہے...", err);
        });
    }

    // صارف کے کسی بھی پہلے لائیو ایکشن (کلک یا اسکرین ٹچ) پر انجن خودکار بیک گراؤنڈ میں آن ہو جائے گا
    document.addEventListener('click', launchMasterAudioEngine, { once: true });
    document.addEventListener('touchstart', launchMasterAudioEngine, { once: true });

        
    </script>
</body>
</html>
